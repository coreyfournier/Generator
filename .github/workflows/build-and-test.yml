name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native unit tests
        run: pio test -e Native -v

  build-esp32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build featheresp32
        env:
          ENV_WIFI_SSID: "test"
          ENV_WIFI_PW: "test"
          ENV_LOG_SERVER_NAME: "localhost"
          ENV_LOG_SERVER_PORT: "514"
        run: pio run -e featheresp32
